name: Lighthouse CI

on:
  pull_request:
    branches: [ main ]
  # Removed: push on main — was sending failure emails on every direct commit.
  # Lighthouse audits now only block PRs, not routine pushes.

jobs:
  lhci:
    name: Run Lighthouse Audits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Build Vite App
        run: npm run build
        env:
          # Provide a dummy value so the LoginModal renders during the audit.
          # The real secret is in .env.local (not committed) and Vercel.
          VITE_LINKEDIN_CLIENT_ID: ci-placeholder

      - name: Install Lighthouse CI CLI
        run: npm install -g @lhci/cli
        
      - name: Run Lighthouse CI
        run: lhci autorun
